services:
  postgres:
    image: postgres:15-alpine
    container_name: watch-postgres
    environment:
      POSTGRES_USER: watchuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchpass123}
      POSTGRES_DB: watchmarketplace
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - watch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchuser -d watchmarketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: watch-adminer
    restart: always
    ports:
     - "5050:8080"
    depends_on:
      - postgres
    networks:
      - watch-network

  redis:
    image: redis:7-alpine
    container_name: watch-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis_data:/data
    networks:
      - watch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: watch-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://watchuser:${POSTGRES_PASSWORD:-watchpass123}@postgres:5432/watchmarketplace?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - watch-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: watch-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    networks:
      - watch-network
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: watch-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - watch-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  watch-network:
    driver: bridge
